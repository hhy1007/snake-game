<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>贪吃蛇游戏</title>
    <style>
        body {
            text-align: center;
            background: #1a1a2e;
            color: white;
            font-family: Arial;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #00dbde;
            margin: 20px 0;
        }
        .score {
            font-size: 24px;
            color: #fc00ff;
            margin: 10px;
            font-weight: bold;
        }
        canvas {
            background: #111;
            border: 3px solid #2d4059;
            border-radius: 5px;
            margin: 10px auto;
            display: block;
        }
        .controls {
            margin: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #00b09b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background: #96c93d;
        }
        .status {
            margin: 10px;
            color: #ffcc00;
            font-size: 18px;
            min-height: 24px;
        }
        .instructions {
            text-align: left;
            max-width: 500px;
            margin: 20px auto;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
        }
        .instructions ul {
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇游戏</h1>
    <div class="score">得分: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="status" id="status">准备开始</div>
    <div class="controls">
        <button id="startBtn">开始游戏</button>
        <button id="pauseBtn">暂停/继续</button>
        <button id="resetBtn">重新开始</button>
    </div>
    <div class="instructions">
        <h3>游戏说明</h3>
        <ul>
            <li>方向键 或 WASD 控制移动</li>
            <li>吃到红色食物得10分</li>
            <li>每吃5个食物速度增加</li>
            <li>撞到墙壁或自己游戏结束</li>
            <li>空格键: 暂停/继续</li>
        </ul>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const gridCount = canvas.width / gridSize;
        
        // 游戏状态
        let snake = [{x:5,y:10},{x:4,y:10},{x:3,y:10}];
        let food = {x:10,y:10};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;
        let gameLoop;
        let speed = 150;
        let foodsEaten = 0;
        
        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制蛇
            snake.forEach((segment, i) => {
                ctx.fillStyle = i === 0 ? '#4CAF50' : '#2196F3';
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });
            
            // 绘制食物
            ctx.fillStyle = '#FF5252';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // 游戏结束画面
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#FF5252';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('游戏结束!', canvas.width/2, canvas.height/2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '18px Arial';
                ctx.fillText(`最终得分: ${score}`, canvas.width/2, canvas.height/2 + 10);
            }
        }
        
        // 更新游戏
        function update() {
            if (gameOver || gamePaused) return;
            
            direction = nextDirection;
            const head = {...snake[0]};
            
            // 移动蛇头
            if (direction === 'up') head.y--;
            if (direction === 'down') head.y++;
            if (direction === 'left') head.x--;
            if (direction === 'right') head.x++;
            
            // 碰撞检测
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                endGame();
                return;
            }
            
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    endGame();
                    return;
                }
            }
            
            snake.unshift(head);
            
            // 吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                foodsEaten++;
                document.getElementById('score').textContent = score;
                
                if (foodsEaten % 5 === 0) {
                    speed = Math.max(50, speed - 10);
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                    document.getElementById('status').textContent = '速度提升!';
                } else {
                    document.getElementById('status').textContent = '+10分!';
                }
                
                // 生成新食物
                do {
                    food = {
                        x: Math.floor(Math.random() * gridCount),
                        y: Math.floor(Math.random() * gridCount)
                    };
                } while (snake.some(s => s.x === food.x && s.y === food.y));
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        // 开始游戏
        function startGame() {
            if (gameOver) resetGame();
            if (!gameRunning) {
                gameRunning = true;
                gameLoop = setInterval(update, speed);
                document.getElementById('status').textContent = '游戏进行中';
            }
            if (gamePaused) {
                gamePaused = false;
                document.getElementById('status').textContent = '游戏继续';
            }
        }
        
        // 暂停/继续
        function togglePause() {
            if (!gameRunning || gameOver) return;
            gamePaused = !gamePaused;
            document.getElementById('status').textContent = 
                gamePaused ? '游戏已暂停' : '游戏继续';
        }
        
        // 重置游戏
        function resetGame() {
            snake = [{x:5,y:10},{x:4,y:10},{x:3,y:10}];
            food = {x:10,y:10};
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameRunning = false;
            gamePaused = false;
            gameOver = false;
            speed = 150;
            foodsEaten = 0;
            
            document.getElementById('score').textContent = score;
            document.getElementById('status').textContent = '准备开始';
            
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            
            draw();
        }
        
        // 结束游戏
        function endGame() {
            gameOver = true;
            gameRunning = false;
            clearInterval(gameLoop);
            gameLoop = null;
            document.getElementById('status').textContent = `游戏结束! 得分: ${score}`;
            draw();
        }
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (gameOver || !gameRunning) return;
            
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') && direction !== 'down') {
                nextDirection = 'up';
            }
            if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && direction !== 'up') {
                nextDirection = 'down';
            }
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && direction !== 'right') {
                nextDirection = 'left';
            }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && direction !== 'left') {
                nextDirection = 'right';
            }
            if (e.key === ' ') {
                togglePause();
                e.preventDefault();
            }
        });
        
        // 按钮事件
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
